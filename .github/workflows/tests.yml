name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - codex/harness-hardening

jobs:
  warning-gates:
    name: Local gate preview
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Run fast harness stages
        run: |
          python3 scripts/run_harness.py --stage static --report-dir reports
          python3 scripts/run_harness.py --stage unit --report-dir reports
          python3 scripts/run_harness.py --stage contract --report-dir reports
          python3 scripts/run_harness.py --stage api --report-dir reports

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-gate-preview-reports
          path: reports/
          if-no-files-found: ignore
