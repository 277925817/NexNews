[pytest]
testpaths =
    tests
markers =
    static: static compliance and workflow structure checks
    unit: deterministic function-level tests
    contract: schema and public contract tests
    api: HTTP API runtime behavior tests
    integration: deterministic cross-module integration tests
    replay: deterministic replay checks
    snapshot: golden snapshot and visual contract checks
    e2e: browser or DOM end-to-end checks
    harness: workflow harness and acceptance evaluator tests
    advisory: non-blocking quality or live-health advisory checks
